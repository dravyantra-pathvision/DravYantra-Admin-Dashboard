version: 1
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf flutter
        - git clone https://github.com/flutter/flutter.git -b 3.22.0
        - export PATH="$PATH:$PWD/flutter/bin"
        - flutter config --enable-web
    build:
      commands:
        - export PATH="$PATH:$PWD/flutter/bin"
        - flutter pub get
        - flutter build web --release
  artifacts:
    baseDirectory: build/web
    files:
      - '**/*'
  cache:
    paths:
      - .pub-cache/**/*
      - flutter/**/*
