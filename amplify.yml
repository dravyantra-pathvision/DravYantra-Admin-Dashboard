version: 1
frontend:
  phases:
    build:
      commands:
        - if [ ! -d "flutter" ]; then git clone https://github.com/flutter/flutter.git -b stable --depth 1; fi
        - export PATH="$PATH:$PWD/flutter/bin"
        - flutter clean
        - flutter pub get
        - flutter build web --release
  artifacts:
    baseDirectory: build/web
    files:
      - '**/*'
  cache:
    paths:
      - .pub-cache/**/*
      - flutter/**/*
