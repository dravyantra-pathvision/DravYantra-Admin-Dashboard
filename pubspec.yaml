name: admin_panel
description: DravYantra Admin Panel — Enterprise Fleet Management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  provider: ^6.1.2

  # HTTP
  http: ^1.2.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.1.0

  # Secure token storage (web-safe)
  flutter_secure_storage: ^9.0.0

  # Charts
  fl_chart: ^0.68.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # Utils
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  qr_flutter: ^4.1.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  universal_html: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
